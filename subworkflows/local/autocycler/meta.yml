# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "autocycler"
description: Generates a consensus assembly from multiple draft assemblies using
  the Autocycler workflow. Assemblies are compressed, clustered,
  trimmed, resolved, combined into a consensus graph, reoriented with
  Dnaapler, and converted to FASTA format for downstream analysis.
keywords:
  - autocycler
  - consensus assembly
  - long-read
  - nanopore
  - genome assembly
  - dnaapler
  - gfa
components:
  - autocycler/subsample
  - autocycler/cluster
  - autocycler/combine
  - autocycler/compress
  - autocycler/resolve
  - autocycler/trim
  - autocycler/gfa2fasta
  - dnaapler
input:
  - assemblies:
      type: tuple
      description: |
        Collection of draft assemblies grouped by barcode for consensus generation
        Structure: [ val(meta), path(fasta) ]
      pattern: "*.{fasta}"
output:
  - consensus_assembly:
      type: tuple
      description: |
        Final Autocycler consensus assembly after Dnaapler reorientation and GFA-to-FASTA conversion
        Structure: [ val(meta), path(fasta) ]
      pattern: "*.fasta"
  - consensus_stats:
      type: tuple
      description: |
        Summary statistics generated during the Autocycler combine step
        Structure: [ val(meta), path(stats) ]
      pattern: "*.tsv"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi"
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
