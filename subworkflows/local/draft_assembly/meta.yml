# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "draft_assembly"
description: Generate draft genome assemblies from Oxford Nanopore long-read data using multiple assemblers for downstream Autocycler consensus generation.
keywords:
  - genome assembly
  - long-read sequencing
  - nanopore
  - autocycler
  - bacterial genomes
components:
  - autocycler/genomesize
  - autocycler/subsample
  - autocycler/miniasm
  - autocycler/weight
  - autocycler/metamdbgfilter
  - flye
  - metamdbg/asm
  - plassembler/long
  - raven
input:
  - reads:
      type: tuple
      description: |
        Demultiplexed Oxford Nanopore FASTQ reads grouped by barcode.
        Structure: [ val(meta), path(fastq) ]
      pattern: "*.{fastq.gz,fastq}"
output:
  - subsampled_reads:
      type: tuple
      description: |
        Four Autocycler subsampled read sets per barcode for independent assembly generation.
        Structure: [ val(meta), path(subsampled_fastqs[]) ]
      pattern: "*.fastq.gz"
  - assemblies:
      type: tuple
      description: |
        Collection of assembler outputs (Flye, MetaMDBG, Miniasm, Plassembler, Raven) grouped by barcode.
        Structure: [ val(meta), path(assemblies[]) ]
      pattern: "*.fasta"
  - normalized_reads:
      type: tuple
      description: |
        Input FASTQ reads reformatted to one FASTQ file per barcode.
        Structure: [ val(meta), path(fastq) ]
      pattern: "*.fastq"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi" 
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
