# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "basecalling"
description: Basecall Oxford Nanopore POD5 files with Dorado
keywords:
  - basecalling
  - nanopore
  - ont
  - dorado
  - pod5
  - bam
  - long reads
components:
  - dorado/basecaller
  - dorado_demux
  - samtools/merge
input:
  - pod5:
      type: file
      description: |
        Oxford Nanopore POD5 files to be basecalled with Dorado.
        Structure: [ val(meta), path(pod5) ]
      pattern: "*.{pod5}"
output:
  - bam:
      type: file
      description: |
        Dorado basecalled BAM files merged across all POD5 inputs into a single BAM file.
        Structure: [ val(meta), path(bam) ]
      pattern: "*.bam"
  - bai:
      type: file
      description: |
        Index file associated with the merged BAM output.
        Structure: [ val(meta), path(bai) ]
      pattern: "*.bai"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi" 
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
