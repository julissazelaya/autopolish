# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "demux"
description: Demultiplex Oxford Nanopore reads by barcode using Dorado demux to generate per-barcode FASTQ files for downstream assembly and polishing.
keywords:
  - nanopore
  - ont
  - dorado
  - demux
  - barcode
  - long reads
components:
  - dorado/demux
input:
  - bam:
      type: tuple
      description: |
        Channel containing merged basecalled BAM files for demultiplexing
        Structure: [ val(meta), path(bam) ]
      pattern: "*.{bam}"
output:
  - reads:
      type: tuple
      description: |
        Demultiplexed FASTQ files, one tuple per classified barcode-- unclassified reads are removed
        Structure: [ val(meta), path(fastq) ]
      pattern: "*.fastq"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi"       
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
