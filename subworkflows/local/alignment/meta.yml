# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "alignment"
description: Aligns demultiplexed Nanopore reads to the Autocycler consensus assembly using Dorado aligner. The resulting alignments are sorted, indexed, and assigned read group tags before being emitted for downstream polishing.
keywords:
  - alignment
  - dorado
  - samtools
  - nanopore
  - bam
  - genome assembly
  - alignment
components:
  - dorado/aligner
  - samtools/addreplacerg
  - samtools/sort
  - samtools/index
input:
  - consensus_assembly:
      type: tuple
      description: |
        Consensus assembly generated by Autocycler.
        Structure: [ val(meta), path(fasta) ]
      pattern: "*.{fasta}"
  - reads:
    type: tuple
    description: |
      Demultiplexed barcode-specific FASTQ reads.
      Structure: [ val(meta), path(fastq) ]
    pattern: "*.{fastq}"    
output:
  - aligned_assembly:
      type: tuple
      description: |
        Sorted, indexed BAM alignments with read groups added
        Structure: [ val(meta), path(bam), path(bai) ]
      pattern: "*.{bam, bai}"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi"    
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
