# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "polishing"
description: Polishes the Autocycler consensus assembly using aligned long reads and Dorado polish to improve consensus sequence accuracy
keywords:
  - nanopore
  - ont
  - dorado
  - long reads
  - polishing
components:
  - dorado/polish
input:
  - aligned_assembly:
      type: tuple
      description: |
        Channel containing aligned reads and index files
        Structure: [ val(meta), path(bam), path(bai) ]
      pattern: "*.{bam, bai}"
  - consensus_assembly:
    type: tuple
    description: |
      Channel containing the consensus assembly generated by Autocycler
      Structure: [ val(meta), path(fasta) ]
    pattern: "*.{fasta}"    
output:
  - fasta:
      type: tuple
      description: |
        Polished assembly generated by Dorado polish
        Structure: [ val(meta), path(fasta) ]
      pattern: "*.fasta"
  - csi:
      type: file
      description: |
        Channel containing CSI files
        Structure: [ val(meta), path(csi) ]
      pattern: "*.csi" 
  - versions:
      type: file
      description: |
        File containing software versions
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@julissazelaya"
maintainers:
  - "@julissazelaya"
